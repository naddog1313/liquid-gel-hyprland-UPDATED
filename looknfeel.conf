# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0

    # Change to niri-like side-scrolling layout
    # layout = scrolling
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 15
    active_opacity = 0.85    # Perfect glass transparency
    inactive_opacity = 0.75
    
    blur {
        enabled = true
        size = 12           # Higher = smoother
        passes = 3          # More passes = "Apple" quality
        xray = false        # Lets blur see "through" other windows
        new_optimizations = false
        ignore_opacity = true 
        noise = 0.02        # Adds that subtle "grain" Apple uses
        contrast = 1.3      # Makes colors pop behind the glass
        brightness = 1.1
    }
}
# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    # Disable all animations
    # enabled = no
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}
# Apply blur and ignore alpha to keep rounded corners clean
# This FORCES Alacritty to stay blurry and translucent
# Correct syntax: 'blur' (no numbers) and 'ignorealpha' (makes blur thick)
windowrulev2 = opaque, class:^(google-chrome-stable)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(google-chrome-stable)$
misc {
    vfr = false # Forces a consistent redraw rate (heavier on GPU, but smoother blur)
}

# Add this to your hyprland.conf to start the service on boot
exec-once = walker --gapplication-service
decoration {


    # This is the NEW 0.51.1 syntax that fixed your error
    shadow {
        enabled = true
        range = 50
        render_power = 4
        color = rgba(00000020) # Soft grey for Light Mode
        offset = 0 10
    }
}
