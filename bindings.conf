# Application bindings
bindd = SUPER, Q, Terminal, exec, alacritty
# Switch workspaces
bindd = SUPER, 1, Workspace 1, workspace, 1
bindd = SUPER, 2, Workspace 2, workspace, 2
bindd = SUPER, 3, Workspace 3, workspace, 3
bindd = SUPER, 4, Workspace 4, workspace, 4
bindd = SUPER, 5, Workspace 5, workspace, 5
bindd = SUPER, 6, Workspace 6, workspace, 6
bindd = SUPER, 7, Workspace 7, workspace, 7
bindd = SUPER, 8, Workspace 8, workspace, 8
bindd = SUPER, 9, Workspace 9, workspace, 9
bindd = SUPER, 0, Workspace 10, workspace, 10
bindm = SUPER, mouse:272, movewindow 
bindm = SUPER, mouse:273, resizewindow 
# Move window to workspace
bindd = SUPER SHIFT, 1, Move to WS 1, movetoworkspace, 1
bindd = SUPER SHIFT, 2, Move to WS 2, movetoworkspace, 2
bindd = SUPER SHIFT, 3, Move to WS 3, movetoworkspace, 3
bindd = SUPER SHIFT, 4, Move to WS 4, movetoworkspace, 4
bindd = SUPER SHIFT, 5, Move to WS 5, movetoworkspace, 5
bindd = SUPER, F, Fullscreen, fullscreen
bindd = SUPER, T, Float, togglefloating
bindd = SUPER, P, Pseudo-tile, pseudo # dwindle
bindd = SUPER, S, Scratchpad, togglespecialworkspace, magic
bindd = SUPER SHIFT, S, Move to Scratchpad, movetoworkspace, special:magic
bindd = SUPER, B, Browser, exec, google-chrome-stable
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
# Removed duplicate SUPER SHIFT, B (it was also bound to Browser)
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, spotify
# Open nano inside an Alacritty terminal
bind = SUPER SHIFT, N, exec, alacritty -e nano
# Super + Shift + Space to reload Waybar
bind = SUPER SHIFT, Space, exec, killall waybar && waybar &
# Extra & Overwrites
bind = SUPER, C, killactive
bind = SUPER, K, exec, hyprkcs
bind = SUPER, J, togglesplit
# Volume control (e = repeatable, l = works on lockscreen)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Screen brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media Player controls
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
# Triggered when the lid is closed
bindl = , switch:on:Lid Switch, exec, hyprlock
# Power Menu (assuming you have wlogout or similar)
bindd = SUPER, Escape, Power Menu, exec, wlogout

# Screenshot a region to clipboard + file
bindd = , Print, Screenshot, exec, grim -g "$(slurp)" - | swappy -f -
# If using Wofi (drun mode shows desktop apps with icons)
bindd = SUPER, Space, App Launcher, exec, walker

gestures {
    # The 'workspace' action enables the 1:1 GNOME-style swipe
    gesture = 3, horizontal, workspace
    
    # Optional: adjust sensitivity and direction
    workspace_swipe_distance = 400
    workspace_swipe_invert = true  # Set to false if you prefer "natural" scroll direction
}
